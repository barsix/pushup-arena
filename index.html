<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PushUp Arena RPG</title>
    <!-- MediaPipe подключается, но не обязателен -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm/vision_wasm_internal.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs" type="module"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: #fff;
            text-align: center;
            padding: 10px;
            margin: 0;
        }
        .card {
            background: #222;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .hp-bar {
            background: #333;
            border-radius: 6px;
            height: 16px;
            width: 100%;
            margin: 10px 0;
            overflow: hidden;
        }
        .hp-fill {
            background: #ff3b30;
            height: 100%;
            width: 100%;
            transition: width 0.1s ease;
        }
        button {
            background: #ff9500;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:disabled { opacity: 0.5; }
        .btn-side {
            width: 45%;
            display: inline-block;
            margin: 5px;
            background: #555;
        }
        .quiz-opt {
            background: #333;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
        }
        .quiz-opt:active { background: #ff9500; }
        .dungeon-card {
            background: #1a1a2e;
            border: 1px solid #4a4a8a;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dungeon-card:active { transform: scale(0.97); }
        #timer {
            font-size: 20px;
            font-weight: bold;
            color: #ffcc00;
            margin: 5px;
        }
        .mob-icon {
            font-size: 40px;
            display: block;
            margin: 5px auto;
        }
    </style>
</head>
<body>
    <!-- ЭКРАН КАЛИБРОВКИ -->
    <div id="quiz-screen" class="card">
        <h2 style="color: #ff9500;">⚙️ КАЛИБРОВКА</h2>
        <p>Сколько отжиманий ты делаешь за один подход?</p>
        <div class="quiz-opt" onclick="setDifficulty(10)">Меньше 10 (Новичок)</div>
        <div class="quiz-opt" onclick="setDifficulty(20)">10–25 (Ветеран)</div>
        <div class="quiz-opt" onclick="setDifficulty(35)">Больше 25 (Киборг)</div>
    </div>

    <!-- ВЫБОР ДАНЖА -->
    <div id="dungeon-select" style="display: none;">
        <h2 style="color:#ff9500;">🗺️ ВЫБОР ДАНЖА</h2>
        <div id="dungeon-list"></div>
    </div>

    <!-- ЭКРАН БОЯ -->
    <div id="dungeon-screen" style="display: none;">
        <div class="card" id="room-header" style="background:#1a1a2e;">
            <h3 id="dungeon-title">Данж</h3>
            <p id="room-info">Комната 1/4</p>
            <span class="mob-icon" id="mob-icon">👾</span>
            <h2 id="mob-name">Моб</h2>
            <div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div>
            <small><span id="hp-text">100</span> / <span id="hp-max">100</span> HP</small>
            <div id="set-progress" style="display:none; margin-top:8px; color:#ffcc00;">
                Подход <span id="current-set">1</span>/<span id="total-sets">3</span>
                | Повторений: <span id="current-reps">0</span>/<span id="target-reps">10</span>
            </div>
            <div id="timer-display" style="display:none;">⏱️ <span id="timer">00:00</span></div>
        </div>
        <button id="start-fight-btn" onclick="startFight()">⚔️ ВСТУПИТЬ В БОЙ</button>
        <button id="manual-rep-btn" style="display:none;" onclick="manualRep()">👊 +1 повторение (ручной ввод)</button>
        <button id="enable-camera-btn" style="display:none;" onclick="enableCamera()">📷 Включить камеру</button>
        <div id="video-box" style="display:none; margin-top:10px; position:relative;">
            <video id="webcam" autoplay playsinline muted style="width:100%; max-width:240px; border-radius:12px; transform:scaleX(-1); border:2px solid #ff9500;"></video>
        </div>
        <button id="next-room-btn" style="display:none;" onclick="nextRoom()">▶️ Следующая комната</button>
    </div>

    <!-- ПОБЕДА -->
    <div id="victory-screen" style="display:none;" class="card">
        <h2 style="color:gold;">🏆 ДАНЖ ПРОЙДЕН!</h2>
        <p>Получено золота: <span id="victory-gold">0</span></p>
        <button onclick="backToDungeons()">🗺️ К выбору данжа</button>
    </div>

    <script type="module">
        import { PoseLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs';

        // Звук
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playHitSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(170, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(35, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Глобальные переменные
        let user = { level: 1, gold: 0, totalPushups: 0 };
        let dmgPerPushup = 10;

        let currentDungeon = null;
        let currentRoomIndex = 0;
        let currentRoom = null;
        let roomHP = 0;
        let roomMaxHP = 0;

        let fightMode = 'normal';
        let fightActive = false;
        let enduranceTimer = null;
        let enduranceSecondsLeft = 0;
        let enduranceReps = 0;
        let setCurrent = 1;
        let setRepsDone = 0;
        let setRestTimer = null;
        let inRest = false;

        // Камера и MediaPipe (опционально)
        let webcamStream = null;
        let poseLandmarker = null;
        let stage = 'up';
        let repThreshold = 0.05;
        let baselineShoulderY = null;
        let cameraEnabled = false; // включена ли камера с распознаванием

        // Данжи
        const dungeons = [
            {
                name: 'Тёмный подвал',
                difficulty: 'Лёгкий',
                bg: '#1a1a2e',
                rooms: [
                    { type: 'normal', mob: 'Крыса', icon: '🐀', hp: 40 },
                    { type: 'endurance', mob: 'Паук', icon: '🕷️', hp: 50, timeLimit: 20 },
                    { type: 'sets', mob: 'Слизень', icon: '🟢', hp: 60, sets: { reps: 8, count: 2, rest: 15 } },
                    { type: 'normal', mob: 'Крысиный король', icon: '👑🐀', hp: 100, isBoss: true }
                ]
            },
            {
                name: 'Лес теней',
                difficulty: 'Средний',
                bg: '#1a2e1a',
                rooms: [
                    { type: 'normal', mob: 'Волк', icon: '🐺', hp: 60 },
                    { type: 'endurance', mob: 'Энт', icon: '🌳', hp: 80, timeLimit: 30 },
                    { type: 'sets', mob: 'Фея', icon: '🧚', hp: 70, sets: { reps: 10, count: 3, rest: 20 } },
                    { type: 'normal', mob: 'Леший', icon: '👹🌿', hp: 150, isBoss: true }
                ]
            },
            {
                name: 'Огненные глубины',
                difficulty: 'Сложный',
                bg: '#2e1a1a',
                rooms: [
                    { type: 'sets', mob: 'Бес', icon: '😈', hp: 70, sets: { reps: 10, count: 2, rest: 10 } },
                    { type: 'endurance', mob: 'Элементаль', icon: '🔥', hp: 90, timeLimit: 25 },
                    { type: 'normal', mob: 'Демон', icon: '👿', hp: 80 },
                    { type: 'normal', mob: 'Архидемон', icon: '👹🔥', hp: 200, isBoss: true }
                ]
            }
        ];

        // Инициализация MediaPipe (вызывается только при включении камеры)
        async function initPoseDetector() {
            if (poseLandmarker) return true;
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
                );
                poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
                        delegate: 'GPU'
                    },
                    runningMode: 'VIDEO',
                    numPoses: 1
                });
                return true;
            } catch (e) {
                console.error('Не удалось загрузить модель распознавания позы:', e);
                return false;
            }
        }

        // Функции экранов
        function showScreen(id) {
            document.querySelectorAll('#quiz-screen, #dungeon-select, #dungeon-screen, #victory-screen').forEach(el => el.style.display = 'none');
            if (id) document.getElementById(id).style.display = 'block';
        }

        function setDifficulty(dmg) {
            dmgPerPushup = dmg;
            localStorage.setItem('pushup_diff', dmg);
            showScreen('dungeon-select');
            renderDungeonList();
            loadUser();
        }

        function loadUser() {
            const saved = localStorage.getItem('pushup_user_rpg');
            if (saved) user = JSON.parse(saved);
        }

        function saveUser() {
            localStorage.setItem('pushup_user_rpg', JSON.stringify(user));
        }

        function renderDungeonList() {
            const list = document.getElementById('dungeon-list');
            list.innerHTML = '';
            dungeons.forEach((dung, idx) => {
                const div = document.createElement('div');
                div.className = 'dungeon-card';
                div.style.background = dung.bg;
                div.innerHTML = `<h3>${dung.name}</h3><small>Сложность: ${dung.difficulty}</small>`;
                div.onclick = () => enterDungeon(idx);
                list.appendChild(div);
            });
        }

        function enterDungeon(index) {
            currentDungeon = dungeons[index];
            currentRoomIndex = 0;
            stopFight();
            showScreen('dungeon-screen');
            loadRoom();
        }

        function loadRoom() {
            currentRoom = currentDungeon.rooms[currentRoomIndex];
            roomMaxHP = currentRoom.hp;
            roomHP = roomMaxHP;
            fightMode = currentRoom.type;
            fightActive = false;
            cameraEnabled = false;
            clearAllTimers();
            stopWebcam(); // на всякий случай

            document.getElementById('dungeon-title').innerText = currentDungeon.name;
            document.getElementById('room-info').innerText = `Комната ${currentRoomIndex + 1}/${currentDungeon.rooms.length}`;
            document.getElementById('mob-icon').innerText = currentRoom.icon || '👾';
            document.getElementById('mob-name').innerText = currentRoom.mob;
            if (currentRoom.isBoss) document.getElementById('mob-name').innerText += ' 💀 БОСС';

            updateHPUI();

            document.getElementById('set-progress').style.display = (fightMode === 'sets') ? 'block' : 'none';
            document.getElementById('timer-display').style.display = (fightMode === 'endurance') ? 'block' : 'none';
            document.getElementById('start-fight-btn').style.display = 'block';
            document.getElementById('manual-rep-btn').style.display = 'none';
            document.getElementById('enable-camera-btn').style.display = 'none';
            document.getElementById('next-room-btn').style.display = 'none';
            document.getElementById('video-box').style.display = 'none';

            if (fightMode === 'sets') {
                setCurrent = 1;
                setRepsDone = 0;
                updateSetUI();
            }
            if (fightMode === 'endurance') {
                enduranceReps = 0;
                document.getElementById('timer').innerText = formatTime(currentRoom.timeLimit);
            }
        }

        function updateHPUI() {
            document.getElementById('hp-max').innerText = roomMaxHP;
            document.getElementById('hp-text').innerText = roomHP;
            document.getElementById('hp-fill').style.width = (roomHP / roomMaxHP * 100) + '%';
        }

        // Бой — теперь использует ручной ввод по умолчанию
        async function startFight() {
            if (fightActive) return;
            fightActive = true;
            document.getElementById('start-fight-btn').style.display = 'none';
            document.getElementById('manual-rep-btn').style.display = 'inline-block';
            document.getElementById('enable-camera-btn').style.display = 'inline-block'; // кнопка для включения камеры

            // Если режим endurance или sets, запускаем таймер/подходы, но без камеры — только ручной ввод
            if (fightMode === 'endurance') {
                startEnduranceMode();
            } else if (fightMode === 'sets') {
                startSetsMode();
            }
            // normal — просто ручной ввод
        }

        function onRepCompleted() {
            if (!fightActive) return;
            playHitSound();
            user.totalPushups++;

            if (fightMode === 'normal') {
                roomHP = Math.max(0, roomHP - dmgPerPushup);
                updateHPUI();
                if (roomHP <= 0) winRoom();
            } else if (fightMode === 'endurance') {
                enduranceReps++;
            } else if (fightMode === 'sets') {
                if (inRest) return;
                setRepsDone++;
                updateSetUI();
                if (setRepsDone >= currentRoom.sets.reps) finishSet();
            }
            saveUser();
        }

        function manualRep() {
            onRepCompleted();
        }

        // --- Включение камеры с распознаванием (опционально) ---
        async function enableCamera() {
            if (cameraEnabled) return;
            const success = await initPoseDetector();
            if (!success) {
                alert('Не удалось загрузить модель. Продолжай с ручным вводом.');
                return;
            }
            // Включаем камеру и запускаем распознавание
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 },
                    audio: false
                });
                const video = document.getElementById('webcam');
                video.srcObject = webcamStream;
                document.getElementById('video-box').style.display = 'block';
                document.getElementById('enable-camera-btn').style.display = 'none';
                cameraEnabled = true;

                baselineShoulderY = null;
                stage = 'up';
                video.onloadedmetadata = () => {
                    detectPoseLoop();
                };
            } catch (err) {
                alert('Нет доступа к камере. Используй ручной ввод.');
                cameraEnabled = false;
            }
        }

        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
                webcamStream = null;
                document.getElementById('webcam').srcObject = null;
                document.getElementById('video-box').style.display = 'none';
            }
            cameraEnabled = false;
        }

        // Цикл распознавания (только если камера включена)
        async function detectPoseLoop() {
            const video = document.getElementById('webcam');
            if (!fightActive || !cameraEnabled || !webcamStream || !poseLandmarker) {
                requestAnimationFrame(detectPoseLoop);
                return;
            }

            if (video.readyState >= 2) {
                const startTimeMs = performance.now();
                const results = await poseLandmarker.detectForVideo(video, startTimeMs);

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    const leftShoulder = landmarks[11];
                    const rightShoulder = landmarks[12];
                    const avgShoulderY = (leftShoulder.y + rightShoulder.y) / 2;

                    if (baselineShoulderY === null) {
                        baselineShoulderY = avgShoulderY;
                        repThreshold = 0.03;
                    }

                    const drop = avgShoulderY - baselineShoulderY;

                    if (drop > repThreshold && stage === 'up') {
                        stage = 'down';
                    } else if (drop < repThreshold * 0.5 && stage === 'down') {
                        stage = 'up';
                        onRepCompleted();
                    }
                }
            }
            requestAnimationFrame(detectPoseLoop);
        }

        // --- Режимы (endurance, sets) ---
        function startEnduranceMode() {
            enduranceReps = 0;
            enduranceSecondsLeft = currentRoom.timeLimit;
            document.getElementById('timer').innerText = formatTime(enduranceSecondsLeft);
            document.getElementById('timer-display').style.display = 'block';

            enduranceTimer = setInterval(() => {
                enduranceSecondsLeft--;
                document.getElementById('timer').innerText = formatTime(enduranceSecondsLeft);
                if (enduranceSecondsLeft <= 0) {
                    clearInterval(enduranceTimer);
                    enduranceTimer = null;
                    finishEnduranceRound();
                }
            }, 1000);
        }

        function finishEnduranceRound() {
            stopWebcam();
            fightActive = false;
            document.getElementById('manual-rep-btn').style.display = 'none';
            document.getElementById('enable-camera-btn').style.display = 'none';
            const totalDmg = enduranceReps * dmgPerPushup;
            roomHP = Math.max(0, roomHP - totalDmg);
            updateHPUI();
            alert(`Время вышло! Сделано ${enduranceReps} повторений. Урон: ${totalDmg}.`);
            if (roomHP <= 0) winRoom();
            else {
                alert('Моб ещё жив! Попробуй ещё раз.');
                loadRoom();
            }
        }

        function startSetsMode() {
            setCurrent = 1;
            setRepsDone = 0;
            inRest = false;
            updateSetUI();
            document.getElementById('set-progress').style.display = 'block';
        }

        function finishSet() {
            stopWebcam();
            fightActive = false;
            document.getElementById('manual-rep-btn').style.display = 'none';
            document.getElementById('enable-camera-btn').style.display = 'none';
            if (setCurrent >= currentRoom.sets.count) {
                roomHP = 0;
                updateHPUI();
                alert('Все подходы выполнены! Моб побеждён.');
                winRoom();
                return;
            }
            inRest = true;
            const restSec = currentRoom.sets.rest;
            alert(`Подход ${setCurrent} завершён! Отдых ${restSec} сек.`);
            setRestTimer = setTimeout(() => {
                inRest = false;
                setCurrent++;
                setRepsDone = 0;
                updateSetUI();
                document.getElementById('manual-rep-btn').style.display = 'inline-block';
                document.getElementById('enable-camera-btn').style.display = 'inline-block';
                alert(`Подход ${setCurrent}. Начинай!`);
            }, restSec * 1000);
        }

        function updateSetUI() {
            document.getElementById('current-set').innerText = setCurrent;
            document.getElementById('total-sets').innerText = currentRoom.sets.count;
            document.getElementById('current-reps').innerText = setRepsDone;
            document.getElementById('target-reps').innerText = currentRoom.sets.reps;
        }

        function winRoom() {
            stopFight();
            stopWebcam();
            document.getElementById('manual-rep-btn').style.display = 'none';
            document.getElementById('enable-camera-btn').style.display = 'none';
            user.gold += currentRoom.isBoss ? 100 : 30;
            saveUser();

            if (currentRoomIndex >= currentDungeon.rooms.length - 1) {
                showScreen('victory-screen');
                document.getElementById('victory-gold').innerText = user.gold;
                user.level++;
                saveUser();
            } else {
                document.getElementById('next-room-btn').style.display = 'block';
                document.getElementById('start-fight-btn').style.display = 'none';
            }
        }

        function nextRoom() {
            currentRoomIndex++;
            document.getElementById('next-room-btn').style.display = 'none';
            loadRoom();
        }

        function backToDungeons() {
            showScreen('dungeon-select');
            renderDungeonList();
        }

        function stopFight() {
            fightActive = false;
            clearAllTimers();
            document.getElementById('manual-rep-btn').style.display = 'none';
            document.getElementById('enable-camera-btn').style.display = 'none';
        }

        function clearAllTimers() {
            if (enduranceTimer) { clearInterval(enduranceTimer); enduranceTimer = null; }
            if (setRestTimer) { clearTimeout(setRestTimer); setRestTimer = null; }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
        }

        // Делаем функции глобальными
        window.setDifficulty = setDifficulty;
        window.startFight = startFight;
        window.manualRep = manualRep;
        window.enableCamera = enableCamera;
        window.nextRoom = nextRoom;
        window.backToDungeons = backToDungeons;

        // Старт
        const savedDiff = localStorage.getItem('pushup_diff');
        if (savedDiff) {
            dmgPerPushup = parseInt(savedDiff);
            showScreen('dungeon-select');
            renderDungeonList();
            loadUser();
        } else {
            showScreen('quiz-screen');
        }

        window.addEventListener('beforeunload', () => stopWebcam());
    </script>
</body>
</html>
